<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<title>Messenger</title>

<style>
body { margin:0; font-family:sans-serif; background:#0f1419; color:white; }

/* LOGIN */

#loginScreen {
  position:fixed; inset:0;
  display:flex; justify-content:center; align-items:center;
  background:#0f1419;
}

.loginBox {
  background:#1a222b;
  padding:40px;
  border-radius:16px;
  width:300px;
  text-align:center;
}

.loginBox input {
  width:100%;
  padding:10px;
  margin-top:15px;
  background:#0f1419;
  border:1px solid #00c896;
  border-radius:8px;
  color:white;
}

.loginBox button {
  width:100%;
  margin-top:15px;
  padding:10px;
  background:#00c896;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* APP */

#app { display:flex; height:100vh; }

#sidebar {
  width:280px;
  background:#162028;
  padding:10px;
  border-right:1px solid #00c89633;
  display:flex;
  flex-direction:column;
}

#newChatBtn {
  background:#00c896;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:10px;
  font-weight:bold;
}

#dialogs { flex:1; overflow-y:auto; }

.dialog {
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  margin-bottom:6px;
  background:#132028;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.15s;
}

.dialog:hover { background:#00c89622; }

.unread {
  background:#ff3b3b;
  border-radius:12px;
  padding:2px 8px;
  font-size:12px;
}

/* CHAT */

#chat { flex:1; display:flex; flex-direction:column; }

#chatHeader {
  padding:15px;
  background:#162028;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #00c89633;
}

#messages {
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.message {
  margin:8px 0;
  padding:10px 14px;
  border-radius:14px;
  max-width:60%;
  animation:fadeIn 0.15s ease-out;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(5px); }
  to { opacity:1; transform:translateY(0); }
}

.mine { background:#00c896; color:black; margin-left:auto; }
.their { background:#1f2c36; }

#inputArea {
  display:flex;
  padding:15px;
  background:#162028;
  border-top:1px solid #00c89633;
}

#input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #00c896;
  background:#0f1419;
  color:white;
  resize:none;
  height:40px;
}

#sendBtn {
  margin-left:10px;
  background:none;
  border:none;
  cursor:pointer;
}

#sendBtn svg {
  width:26px;
  height:26px;
  fill:#00c896;
}

/* MODAL */

#modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalBox {
  background:#1a222b;
  width:350px;
  max-height:500px;
  border-radius:16px;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.modalBox input {
  padding:8px;
  border-radius:8px;
  border:1px solid #00c896;
  background:#0f1419;
  color:white;
  margin-bottom:10px;
}

#userList {
  flex:1;
  overflow-y:auto;
}

.userItem {
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.userItem:hover {
  background:#00c89622;
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="loginBox">
    <h2>Вход</h2>
    <input id="nicknameInput" placeholder="Введите никнейм"/>
    <button onclick="login()">Войти</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div id="sidebar">
    <button id="newChatBtn" onclick="openModal()">➕ Новый чат</button>
    <div id="dialogs"></div>
  </div>

  <div id="chat">
    <div id="chatHeader">
      <span id="chatTitle">Выберите диалог</span>
    </div>
    <div id="messages"></div>
    <div id="inputArea">
      <textarea id="input" placeholder="Сообщение..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24">
          <path d="M2 21L23 12 2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div id="modal">
  <div class="modalBox">
    <input id="searchUser" placeholder="Поиск..." oninput="renderUserList()"/>
    <div id="userList"></div>
  </div>
</div>

<script>
const socket = io("https://simple-messenger-xh9u.onrender.com");

let userId = localStorage.getItem("userId") || crypto.randomUUID();
localStorage.setItem("userId", userId);

let nickname = localStorage.getItem("nickname");
let users = {};
let dialogs = JSON.parse(localStorage.getItem("dialogs") || "{}");
let currentRoom = null;

if (nickname) startApp();

function login(){
  nickname = document.getElementById("nicknameInput").value.trim();
  if(!nickname) return;
  localStorage.setItem("nickname", nickname);
  startApp();
}

function startApp(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="flex";
  socket.emit("join",{userId,nickname});
}

socket.on("users_update",(data)=>{
  users=data;
  renderDialogs();
});

function renderDialogs(){
  const container=document.getElementById("dialogs");
  container.innerHTML="";
  Object.keys(dialogs).forEach(id=>{
    const d=dialogs[id];
    const div=document.createElement("div");
    div.className="dialog";
    div.innerHTML=`
      <div>${d.nickname}</div>
      ${d.unread?`<div class="unread">${d.unread}</div>`:""}
    `;
    div.onclick=()=>openDialog(id);
    container.appendChild(div);
  });
}

function openModal(){
  document.getElementById("modal").style.display="flex";
  renderUserList();
}

function renderUserList(){
  const list=document.getElementById("userList");
  list.innerHTML="";
  const search=document.getElementById("searchUser").value.toLowerCase();

  const onlineUsers=Object.entries(users)
    .filter(([id,u])=>id!==userId && u.socketId)
    .sort((a,b)=>a[1].nickname.localeCompare(b[1].nickname));

  onlineUsers.forEach(([id,u])=>{
    if(!u.nickname.toLowerCase().includes(search)) return;
    if(dialogs[id]) return;

    const div=document.createElement("div");
    div.className="userItem";
    div.textContent=u.nickname;
    div.onclick=()=>{
      dialogs[id]={nickname:u.nickname,messages:[],unread:0};
      localStorage.setItem("dialogs",JSON.stringify(dialogs));
      document.getElementById("modal").style.display="none";
      renderDialogs();
    };
    list.appendChild(div);
  });
}

document.getElementById("modal").onclick=(e)=>{
  if(e.target.id==="modal") e.target.style.display="none";
};

function openDialog(otherId){
  currentRoom=[userId,otherId].sort().join("_");
  socket.emit("start_dialog",{room:currentRoom});
  document.getElementById("chatTitle").innerText=dialogs[otherId].nickname;
  dialogs[otherId].unread=0;
  renderMessages();
}

function renderMessages(){
  const div=document.getElementById("messages");
  div.innerHTML="";
  const msgs=dialogs[getOtherId()]?.messages||[];

  msgs.forEach(msg=>{
    const m=document.createElement("div");
    m.className="message "+(msg.authorId===userId?"mine":"their");
    m.innerText=msg.text;
    div.appendChild(m);
  });

  div.scrollTop=div.scrollHeight;
}

function sendMessage(){
  const input=document.getElementById("input");
  if(!input.value.trim()||!currentRoom) return;

  socket.emit("send_message",{
    room:currentRoom,
    messageId:crypto.randomUUID(),
    text:input.value,
    time:new Date().toLocaleTimeString()
  });

  input.value="";
}

document.getElementById("input").addEventListener("keydown",(e)=>{
  if(e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

socket.on("receive_message",(data)=>{
  const otherId=data.authorId===userId?getOtherId():data.authorId;

  if(!dialogs[otherId])
    dialogs[otherId]={nickname:data.authorName,messages:[],unread:0};

  dialogs[otherId].messages.push(data);

  if(currentRoom!==data.room){
    dialogs[otherId].unread++;
  }

  localStorage.setItem("dialogs",JSON.stringify(dialogs));
  if(currentRoom===data.room) renderMessages();
  renderDialogs();
});

function getOtherId(){
  return currentRoom?.split("_").find(id=>id!==userId);
}
</script>

</body>
</html>
