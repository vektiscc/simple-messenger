<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Messenger</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background-color: #1e1f22;
  color: #e3e3e3;
}

h2 {
  font-weight: 500;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #333;
  background-color: #2b2d31;
  color: white;
  outline: none;
}

button {
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background-color: #10a37f;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background-color: #0e8c6c;
}

#chat {
  margin-top: 15px;
  height: 350px;
  overflow-y: auto;
  padding: 10px;
  background-color: #2b2d31;
  border-radius: 12px;
}

.message {
  margin-bottom: 8px;
  padding: 8px 12px;
  background-color: #3a3d42;
  border-radius: 10px;
  max-width: 70%;
}

.message.self {
  background-color: #10a37f;
  align-self: flex-end;
}

#messenger {
  display: flex;
  flex-direction: column;
}

#chat {
  display: flex;
  flex-direction: column;
}
</style>
</head>
<body>

<h2>Simple Messenger</h2>

<div id="login">
<input id="nickname" placeholder="Ваш ник">
<button onclick="register()">Войти</button>
</div>

<div id="startChat" style="display:none;">
<input id="targetNick" placeholder="Кому написать">
<button onclick="startChat()">Начать чат</button>
</div>

<div id="messenger" style="display:none;">
<div id="chat"></div>
<input id="messageInput">
<button onclick="sendMessage()">Отправить</button>
</div>

<script>
const socket = io("https://simple-messenger-xh9u.onrender.com");

let currentRoom = "";

function register(){
  const nick = document.getElementById("nickname").value.trim();
  if (!nick) return alert("Введите ник");

  socket.emit("register", nick);
}

  socket.on("nickname_taken", ()=>{
  alert("Этот ник уже используется");
});

socket.on("register_success", ()=>{
  document.getElementById("login").style.display="none";
  document.getElementById("startChat").style.display="block";
});

function startChat(){
  const target = document.getElementById("targetNick").value;
  socket.emit("start_chat", target);
}

socket.on("chat_started", (room)=>{
  currentRoom = room;
  document.getElementById("startChat").style.display="none";
  document.getElementById("messenger").style.display="block";
});

socket.on("user_not_found", ()=>{
  alert("Пользователь не онлайн");
});

function sendMessage(){
  const message = document.getElementById("messageInput").value;
  socket.emit("send_message", { room: currentRoom, message });
  document.getElementById("messageInput").value="";
}

socket.on("receive_message", (data)=>{
  const div=document.createElement("div");
  div.innerHTML="<b>"+data.author+":</b> "+data.message;
  document.getElementById("chat").appendChild(div);
});
</script>

</body>

</html>
