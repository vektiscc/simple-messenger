<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<title>Messenger</title>
<style>
body { margin:0; font-family:sans-serif; background:#1e1f22; color:white; display:flex; height:100vh;}
#sidebar { width:250px; background:#2b2d31; padding:10px; overflow-y:auto;}
#chat { flex:1; display:flex; flex-direction:column;}
.dialog { padding:10px; cursor:pointer; border-radius:8px;}
.dialog:hover { background:#3a3c41;}
.online { color:#3ba55d;}
.offline { color:gray;}
#chatHeader { padding:10px; background:#2b2d31; display:flex; justify-content:space-between; align-items:center;}
#messages { flex:1; padding:10px; overflow-y:auto;}
.message { margin:5px 0; padding:8px 12px; border-radius:12px; max-width:60%; position:relative;}
.mine { background:#3ba55d; margin-left:auto;}
.their { background:#3a3c41;}
.time { font-size:10px; opacity:0.7; margin-left:5px;}
.deleteBtn { font-size:10px; cursor:pointer; margin-left:5px; opacity:0.6;}
#inputArea { display:flex; padding:10px; background:#2b2d31;}
#input { flex:1; padding:8px;}
button { margin-left:5px;}
</style>
</head>
<body>

<div id="sidebar"></div>

<div id="chat">
  <div id="chatHeader">
    <span id="chatTitle">Выберите диалог</span>
    <button onclick="deleteCurrentChat()">Удалить чат</button>
  </div>
  <div id="messages"></div>
  <div id="inputArea">
    <input id="input" placeholder="Сообщение..."/>
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const socket = io("https://твой-render-url"); // ← ВСТАВЬ СВОЙ URL

let userId = localStorage.getItem("userId");
if (!userId) {
  userId = crypto.randomUUID();
  localStorage.setItem("userId", userId);
}

let nickname = localStorage.getItem("nickname");
if (!nickname) {
  nickname = prompt("Введите ник:");
  localStorage.setItem("nickname", nickname);
}

socket.emit("join", { userId, nickname });

let users = {};
let dialogs = JSON.parse(localStorage.getItem("dialogs") || "{}");
let currentRoom = null;

socket.on("nickname_taken", ()=>{
  alert("Ник уже используется онлайн!");
  localStorage.removeItem("nickname");
  location.reload();
});

socket.on("users_update", (serverUsers)=>{
  users = serverUsers;
  renderDialogs();
});

function renderDialogs(){
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  Object.keys(dialogs).forEach(otherId=>{
    const div = document.createElement("div");
    div.className="dialog";

    const isOnline = users[otherId] && users[otherId].socketId;
    const name = dialogs[otherId].nickname;

    div.innerHTML = `${name} <span class="${isOnline?'online':'offline'}">●</span>`;
    div.onclick = ()=>openDialog(otherId);
    sidebar.appendChild(div);
  });
}

function openDialog(otherId){
  const room = [userId, otherId].sort().join("_");
  currentRoom = room;

  socket.emit("start_dialog", { from:userId, to:otherId });

  document.getElementById("chatTitle").innerText = dialogs[otherId].nickname;
  renderMessages();
}

function renderMessages(){
  const messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML="";

  if (!currentRoom) return;
  const msgs = dialogs[getOtherId()]?.messages || [];

  msgs.forEach(msg=>{
    if(msg.deleted) return;

    const div = document.createElement("div");
    div.className = "message " + (msg.authorId===userId?"mine":"their");
    div.innerHTML = `
      ${msg.text}
      <span class="time">${msg.time}</span>
      <span class="deleteBtn" onclick="deleteMessage('${msg.messageId}')">🗑</span>
    `;
    messagesDiv.appendChild(div);
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function sendMessage(){
  const input = document.getElementById("input");
  if(!input.value || !currentRoom) return;

  const messageId = crypto.randomUUID();
  const time = new Date().toLocaleTimeString();

  socket.emit("send_message", {
    room: currentRoom,
    messageId,
    text: input.value,
    time
  });

  input.value="";
}

socket.on("receive_message", (data)=>{
  const otherId = data.authorId===userId ? getOtherId() : data.authorId;

  if(!dialogs[otherId]){
    dialogs[otherId] = { nickname:data.authorName, messages:[] };
  }

  dialogs[otherId].messages.push(data);
  localStorage.setItem("dialogs", JSON.stringify(dialogs));

  if(data.room===currentRoom) renderMessages();
  renderDialogs();
});

function deleteMessage(messageId){
  if(!confirm("Удалить сообщение у обоих?")) return;

  socket.emit("delete_message",{ room:currentRoom, messageId });
}

socket.on("message_deleted", ({ room, messageId })=>{
  const otherId = getOtherId();
  dialogs[otherId].messages = dialogs[otherId].messages.map(m=>{
    if(m.messageId===messageId) m.deleted=true;
    return m;
  });
  localStorage.setItem("dialogs", JSON.stringify(dialogs));
  if(room===currentRoom) renderMessages();
});

function deleteCurrentChat(){
  if(!confirm("Удалить чат полностью?")) return;
  socket.emit("delete_chat",{ room:currentRoom });
}

socket.on("chat_deleted", ({ room })=>{
  const otherId = getOtherId();
  delete dialogs[otherId];
  localStorage.setItem("dialogs", JSON.stringify(dialogs));
  currentRoom=null;
  document.getElementById("chatTitle").innerText="Выберите диалог";
  renderDialogs();
  renderMessages();
});

function getOtherId(){
  return currentRoom.split("_").find(id=>id!==userId);
}
</script>

</body>
</html>
