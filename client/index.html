<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<title>Messenger</title>

<style>
body { margin:0; font-family:sans-serif; background:#0f1419; color:white; }

/* LOGIN */

#loginScreen {
  position:fixed; inset:0;
  display:flex; justify-content:center; align-items:center;
  background:#0f1419;
}

.loginBox {
  background:#1a222b;
  padding:40px;
  border-radius:16px;
  width:300px;
  text-align:center;
}

.loginBox input {
  width:100%;
  padding:10px;
  margin-top:15px;
  background:#0f1419;
  border:1px solid #00c896;
  border-radius:8px;
  color:white;
}

.loginBox button {
  width:100%;
  margin-top:15px;
  padding:10px;
  background:#00c896;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* APP */

#app { display:flex; height:100vh; }

#sidebar {
  width:280px;
  background:#162028;
  padding:10px;
  border-right:1px solid #00c89633;
  display:flex;
  flex-direction:column;
}

#newChatBtn {
  background:#00c896;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:10px;
  font-weight:bold;
}

#dialogs { flex:1; overflow-y:auto; }

.dialog {
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  margin-bottom:6px;
  background:#132028;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.15s;
}

.dialog:hover { background:#00c89622; }

.unread {
  background:#ff3b3b;
  border-radius:12px;
  padding:2px 8px;
  font-size:12px;
}

/* CHAT */

#chat { flex:1; display:flex; flex-direction:column; }

#chatHeader {
  padding:15px;
  background:#162028;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #00c89633;
}

#messages {
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.message {
  margin:8px 0;
  padding:8px 12px;
  border-radius:16px;
  display:block;
  width:fit-content;
  max-width:50%;
  word-wrap:break-word;
  font-size:14px;
  animation:fadeIn 0.15s ease-out;
}

  .mine {
  background:#00c896;
  color:black;
  margin-left:auto;
}

.their {
  background:#1f2c36;
  margin-right:auto;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(5px); }
  to { opacity:1; transform:translateY(0); }
}

.mine { background:#00c896; color:black; margin-left:auto; }
.their { background:#1f2c36; }

#inputArea {
  display:flex;
  align-items:center;
  padding:12px 15px;
  background:#162028;
  border-top:1px solid #00c89633;
}
  
#input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #00c896;
  background:#0f1419;
  color:white;
  resize:none;
  height:40px;
}

#sendBtn {
  margin-left:10px;
  background:#00c896;
  border:none;
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.15s;
}

#sendBtn:hover {
  background:#00e6aa;
}

.triangle {
  width:0;
  height:0;
  border-top:7px solid transparent;
  border-bottom:7px solid transparent;
  border-left:12px solid black;
}

/* MODAL */

#modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalBox {
  background:#1a222b;
  width:350px;
  max-height:500px;
  border-radius:16px;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.modalBox input {
  padding:8px;
  border-radius:8px;
  border:1px solid #00c896;
  background:#0f1419;
  color:white;
  margin-bottom:10px;
}

  #deleteBtn {
  background:#ff4d4d;
  border:none;
  width:36px;
  height:36px;
  border-radius:50%;
  cursor:pointer;
  font-size:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.15s;
}

#deleteBtn:hover {
  background:#ff6666;
}
  
#userList {
  flex:1;
  overflow-y:auto;
}

.userItem {
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.userItem:hover {
  background:#00c89622;
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="loginBox">
    <h2>Вход</h2>
    <input id="nicknameInput" placeholder="Введите никнейм"/>
    <button onclick="login()">Войти</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div id="sidebar">
    <button id="newChatBtn" onclick="openModal()">➕ Новый чат</button>
    <div id="dialogs"></div>
  </div>

  <div id="chat">
<div id="chatHeader">
  <span id="chatTitle">Выберите диалог</span>
<button onclick="deleteChat()" id="deleteBtn">
  🗑
</button>
</div>
    <div id="messages"></div>
    <div id="inputArea">
      <textarea id="input" placeholder="Сообщение..."></textarea>
<button id="sendBtn">
  <span class="triangle"></span>
</button>
    </div>
  </div>
</div>

<div id="modal">
  <div class="modalBox">
    <input id="searchUser" placeholder="Поиск..." oninput="renderUserList()"/>
    <div id="userList"></div>
  </div>
</div>

<script>
const socket = io("https://simple-messenger-xh9u.onrender.com");

let myUserId = localStorage.getItem("userId");
let myNickname = localStorage.getItem("nickname");

let users = {};
let dialogs = JSON.parse(localStorage.getItem("dialogs") || "{}");
let currentChat = null;

/* ELEMENTS */
const loginScreen = document.getElementById("loginScreen");
const app = document.getElementById("app");
const nicknameInput = document.getElementById("nicknameInput");
const dialogsList = document.getElementById("dialogs");
const messagesContainer = document.getElementById("messages");
const input = document.getElementById("input");
const chatTitle = document.getElementById("chatTitle");
const modal = document.getElementById("modal");
const searchUser = document.getElementById("searchUser");
const userList = document.getElementById("userList");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
sendBtn.addEventListener("click", sendMessage);

/* LOGIN */
function login() {
  const nickname = nicknameInput.value.trim();
  if (!nickname) return;

  myUserId = crypto.randomUUID();
  myNickname = nickname;

  localStorage.setItem("userId", myUserId);
  localStorage.setItem("nickname", myNickname);

  socket.emit("join", { userId: myUserId, nickname: myNickname });

  loginScreen.style.display = "none";
  app.style.display = "flex";

  renderDialogs();
}

if (myUserId && myNickname) {
  socket.emit("join", { userId: myUserId, nickname: myNickname });
  loginScreen.style.display = "none";
  app.style.display = "flex";
  renderDialogs();
}

function saveDialogs() {
  localStorage.setItem("dialogs", JSON.stringify(dialogs));
}

function renderDialogs() {
  dialogsList.innerHTML = "";

  Object.keys(dialogs).forEach((userId) => {
    const dialog = dialogs[userId];

    const div = document.createElement("div");
    div.className = "dialog";
    div.onclick = () => openChat(userId);

    div.innerHTML = `
      <span>${dialog.nickname}</span>
      ${
        dialog.unread > 0
          ? `<span class="unread">${dialog.unread}</span>`
          : ""
      }
    `;

    dialogsList.appendChild(div);
  });
}

function openChat(userId) {
  currentChat = userId;
  dialogs[userId].unread = 0;
  saveDialogs();
  chatTitle.innerText = dialogs[userId].nickname;
  renderDialogs();
  renderMessages();
}

function renderMessages() {
  messagesContainer.innerHTML = "";
  if (!dialogs[currentChat]) return;

  dialogs[currentChat].messages.forEach((msg) => {
    const div = document.createElement("div");
    div.className = "message " + (msg.fromMe ? "mine" : "their");

    div.innerHTML = `
      <div>${msg.message}</div>
      <div style="
        font-size:11px;
        opacity:0.6;
        margin-top:4px;
        text-align:right;
      ">
        ${msg.time}
      </div>
    `;

    messagesContainer.appendChild(div);
  });

  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function createDialog(userId, nickname) {
  if (!dialogs[userId]) {
    dialogs[userId] = {
      nickname,
      messages: [],
      unread: 0
    };
    saveDialogs();
    renderDialogs();
  }
}

/* SEND MESSAGE */
function sendMessage() {
  if (!currentChat) return;

  const message = input.value.trim();
  if (!message) return;

const now = new Date();
const time =
  now.getHours().toString().padStart(2, "0") +
  ":" +
  now.getMinutes().toString().padStart(2, "0");

  dialogs[currentChat].messages.push({
    fromMe: true,
    message,
    time
  });

  saveDialogs();
  renderMessages();

  socket.emit("send_message", {
    fromUserId: myUserId,
    toUserId: currentChat,
    message,
    time
  });

  input.value = "";
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

socket.on("receive_message", ({ fromUserId, message, time }) => {
  if (!dialogs[fromUserId]) {
    createDialog(fromUserId, users[fromUserId]?.nickname || "Unknown");
  }

  dialogs[fromUserId].messages.push({
    fromMe: false,
    message,
    time
  });

  if (currentChat !== fromUserId) {
    dialogs[fromUserId].unread =
      (dialogs[fromUserId].unread || 0) + 1;
  }

  saveDialogs();
  renderDialogs();
  renderMessages();
});

socket.on("dialog_created", ({ userId, nickname }) => {
  createDialog(userId, nickname);
});

socket.on("users_update", (serverUsers) => {
  users = serverUsers;
  renderUserList();
});

/* MODAL */
function openModal() {
  modal.style.display = "flex";
  renderUserList();
}

function closeModal() {
  modal.style.display = "none";
}

function renderUserList() {
  if (!userList) return;

  const query = searchUser.value.toLowerCase();
  userList.innerHTML = "";

  Object.entries(users)
    .filter(([id]) => id !== myUserId)
    .filter(([id, u]) =>
      u.nickname.toLowerCase().includes(query)
    )
    .sort((a, b) =>
      a[1].nickname.localeCompare(b[1].nickname)
    )
    .forEach(([id, u]) => {
      const div = document.createElement("div");
      div.className = "userItem";
      div.innerText = u.nickname;
      div.onclick = () => {
        createDialog(id, u.nickname);
        socket.emit("create_dialog", {
          fromUserId: myUserId,
          toUserId: id,
          fromNickname: myNickname
        });
        openChat(id);
        closeModal();
      };
      userList.appendChild(div);
    });
}

window.deleteChat = function () {
  if (!currentChat) return;

  if (!confirm("Удалить чат?")) return;

  delete dialogs[currentChat];
  saveDialogs();

  currentChat = null;
  chatTitle.innerText = "Выберите диалог";
  messagesContainer.innerHTML = "";

  renderDialogs();
};

  let typingTimeout = null;

input.addEventListener("input", () => {
  if (!currentChat) return;

  socket.emit("typing", { toUserId: currentChat });
});

  socket.on("typing", () => {
  if (!currentChat) return;

  chatTitle.innerText =
    dialogs[currentChat].nickname + " печатает...";

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    chatTitle.innerText = dialogs[currentChat].nickname;
  }, 1200);
});
  
</script>

</body>
</html>
