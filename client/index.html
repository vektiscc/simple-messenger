<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Messenger 2.0</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#1e1f22;
  color:#e3e3e3;
}

.app {
  display:flex;
  height:100vh;
}

.sidebar {
  width:220px;
  background:#2b2d31;
  padding:15px;
  overflow-y:auto;
}

.sidebar h3 {
  margin-top:0;
}

.user {
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.user:hover {
  background:#3a3d42;
}

.chatArea {
  flex:1;
  display:flex;
  flex-direction:column;
}

.chatHeader {
  padding:15px;
  background:#2b2d31;
  border-bottom:1px solid #3a3d42;
}

#chat {
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message {
  max-width:60%;
  padding:10px 14px;
  border-radius:12px;
  background:#3a3d42;
  position:relative;
}

.message.self {
  background:#10a37f;
  align-self:flex-end;
}

.time {
  font-size:11px;
  opacity:0.6;
  margin-top:4px;
}

.inputArea {
  display:flex;
  padding:10px;
  background:#2b2d31;
  gap:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#3a3d42;
  color:white;
}

button {
  background:#10a37f;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

#loginScreen {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
</style>
</head>

<body>

<div id="loginScreen">
  <div>
    <h2>Вход</h2>
    <input id="nickname" placeholder="Введите ник">
    <button onclick="register()">Войти</button>
  </div>
</div>

<div class="app" style="display:none;" id="app">

  <div class="sidebar">
    <h3>Онлайн</h3>
    <div id="userList"></div>
  </div>

  <div class="chatArea">
    <div class="chatHeader">
      <span id="currentChatName">Выберите пользователя</span>
    </div>

    <div id="chat"></div>

    <div class="inputArea">
      <input id="messageInput" placeholder="Сообщение...">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script>

const socket = io("https://simple-messenger-xh9u.onrender.com");

let myNickname = "";
let currentRoom = "";

function register(){
  const nick = document.getElementById("nickname").value.trim();
  if (!nick) return alert("Введите ник");

  socket.emit("register", nick);
}

socket.on("nickname_taken", ()=>{
  alert("Этот ник уже используется");
});

socket.on("register_success", ()=>{
  myNickname = document.getElementById("nickname").value.trim();
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="flex";
});

socket.on("online_users", (users)=>{
  const list = document.getElementById("userList");
  list.innerHTML="";

  users.forEach(user=>{
    if(user === myNickname) return;

    const div=document.createElement("div");
    div.className="user";
    div.textContent=user;

    div.onclick=()=>{
      socket.emit("start_chat", user);
      document.getElementById("currentChatName").textContent=user;
    };

    list.appendChild(div);
  });
});

socket.on("chat_started", (data)=>{
  currentRoom = data.room;
  document.getElementById("chat").innerHTML="";
});

socket.on("receive_message", (data)=>{
  const div=document.createElement("div");
  div.classList.add("message");

  if(data.author === myNickname){
    div.classList.add("self");
  }

  div.innerHTML = `
    <div><b>${data.author}</b></div>
    <div>${data.message}</div>
    <div class="time">${data.time}</div>
  `;

  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
});

function sendMessage(){
  if(!currentRoom) return;

  const input = document.getElementById("messageInput");
  const message = input.value.trim();
  if(!message) return;

  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  socket.emit("send_message", {
    room: currentRoom,
    message,
    time
  });

  input.value="";
}

document.getElementById("messageInput")
  .addEventListener("keypress", function(e){
    if(e.key === "Enter"){
      sendMessage();
    }
  });

</script>

</body>
</html>
